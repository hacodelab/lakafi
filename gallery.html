<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Lakafi & Toretto</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: #111;
    color: white;
    padding: 15px;
    text-align: center;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img, .gallery video {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
}

.placeholder {
    background: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 14px;
    border-radius: 10px;
    height: 200px;
}

</style>
</head>

<body>

<header>
    <h2>Our Gallery</h2>
</header>

<section class="gallery">

    <!-- VIDEO -->
    <video controls>
        <source src="video1.mp4" type="video/mp4">
    </video>

    <!-- IMAGES -->
    <img src="zanzibar1.jpg" alt="">
    <img src="zanzibar2.jpg" alt="">
    <img src="car.jpg" alt="">
    <img src="car2.jpg" alt="">
    <img src="visa.jpg" alt="">
    <img src="safari1.jpg" alt="">
    <img src="safari2.jpg" alt="">
    <img src="product1.jpeg" alt="">
    <img src="product2.jpeg" alt="">
    <img src="hero.jpeg" alt="">

    <!-- PLACEHOLDERS (ongeza baadae) -->
    <div class="placeholder">Add Image</div>
    <div class="placeholder">Add Video</div>
    <div class="placeholder">Add Image</div>
    <div class="placeholder">Add Video</div>
    <div class="placeholder">Add Image</div>
    <div class="placeholder">Add Video</div>
    <div class="placeholder">Add Image</div>
    <div class="placeholder">Add Video</div>

</section>

</body>
</html>
