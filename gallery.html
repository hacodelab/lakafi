<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Lakafi & Toretto</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

/* HEADER */
header {
    background: rgba(0,0,0,0.7);
    padding: 20px;
    text-align: center;
    font-size: 22px;
}

/* BUTTONS */
.buttons {
    text-align: center;
    margin: 20px;
}

.buttons button {
    padding: 10px 18px;
    margin: 5px;
    border: none;
    border-radius: 25px;
    background: #ff7e5f;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.buttons button:hover {
    background: #feb47b;
    transform: scale(1.1);
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD STYLE */
.item {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    backdrop-filter: blur(5px);
    transition: 0.3s;
}

/* IMAGE & VIDEO */
.item img, .item video {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* HOVER EFFECT 🔥 */
.item:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 10px 25px rgba(0,0,0,0.8);
}

/* HIDE */
.hide {
    display: none;
}
</style>
</head>

<body>

<header>
    <h2>Our Gallery</h2>
</header>

<!-- BUTTONS -->
<div class="buttons">
    <button onclick="filterSelection('all')">All</button>
    <button onclick="filterSelection('image')">Images</button>
    <button onclick="filterSelection('video')">Videos</button>
</div>

<!-- GALLERY -->
<section class="gallery">

    <!-- VIDEO -->
    <div class="item video">
        <video controls>
            <source src="video1.mp4" type="video/mp4">
        </video>
    </div>

    <!-- IMAGES -->
    <div class="item image"><img src="zanzibar1.jpg"></div>
    <div class="item image"><img src="zanzibar2.jpg"></div>
    <div class="item image"><img src="car.jpg"></div>
    <div class="item image"><img src="car2.jpg"></div>
    <div class="item image"><img src="visa.jpg"></div>
    <div class="item image"><img src="safari1.jpg"></div>
    <div class="item image"><img src="safari2.jpg"></div>
    <div class="item image"><img src="product1.jpeg"></div>
    <div class="item image"><img src="product2.jpeg"></div>
    <div class="item image"><img src="hero.jpeg"></div>

</section>

<script>
function filterSelection(category) {
    let items = document.getElementsByClassName("item");

    for (let i = 0; i < items.length; i++) {
        if (category === "all") {
            items[i].classList.remove("hide");
        } else {
            if (items[i].classList.contains(category)) {
                items[i].classList.remove("hide");
            } else {
                items[i].classList.add("hide");
            }
        }
    }
}
</script>

</body>
</html>
